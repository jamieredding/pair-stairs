<!DOCTYPE HTML>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pair Stairs</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <script type="text/javascript" src="js/developers.js"></script>
</head>
<body>
<header>
    <a href="/">pair-stairs</a>
    <a href="/developers">Developers</a>
    <a href="/streams">Streams</a>
</header>
<main>
    <h2>Developers</h2>
    <button type="button" onclick="openDialog()">New Developer</button>

    <dialog id="add-developer-dialog">
        <form id="add-developer-form" method="dialog">
            <h3>Add new developer</h3>
            <label for="name">Developer Name</label>
            <input type="text" name="name" id="name"/>
            <button>Save</button>
        </form>
    </dialog>

    <ul id="developers-list">
        <li th:each="developerInfo : ${developerInfos}"
            th:text="${developerInfo.displayName()}">
        </li>
    </ul>
</main>
</body>
</html>
